<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Breathe</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Breathing animation">
      <div class="halo halo-outer" aria-hidden="true"></div>
      <div class="halo halo-inner" aria-hidden="true"></div>
      <svg
        class="flower"
        viewBox="0 0 600 600"
        aria-hidden="true"
        focusable="false"
      >
        <defs>
          <linearGradient id="petal-fill" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#d7efff" />
            <stop offset="34%" stop-color="#a8daf7" />
            <stop offset="70%" stop-color="#76b6ea" />
            <stop offset="100%" stop-color="#5489c9" />
          </linearGradient>
          <radialGradient id="core-fill" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#e4f5ff" stop-opacity="0.26" />
            <stop offset="34%" stop-color="#b9dff6" stop-opacity="0.16" />
            <stop offset="72%" stop-color="#79b7e6" stop-opacity="0.05" />
            <stop offset="100%" stop-color="#79b7e6" stop-opacity="0" />
          </radialGradient>
        </defs>

        <g class="flower__group flower__group--echo" transform="rotate(18 300 300)">
          <ellipse class="petal" cx="300" cy="194" rx="64" ry="122" />
          <ellipse class="petal" cx="300" cy="194" rx="64" ry="122" transform="rotate(36 300 300)" />
          <ellipse class="petal" cx="300" cy="194" rx="64" ry="122" transform="rotate(72 300 300)" />
          <ellipse class="petal" cx="300" cy="194" rx="64" ry="122" transform="rotate(108 300 300)" />
          <ellipse class="petal" cx="300" cy="194" rx="64" ry="122" transform="rotate(144 300 300)" />
          <ellipse class="petal" cx="300" cy="194" rx="64" ry="122" transform="rotate(180 300 300)" />
          <ellipse class="petal" cx="300" cy="194" rx="64" ry="122" transform="rotate(216 300 300)" />
          <ellipse class="petal" cx="300" cy="194" rx="64" ry="122" transform="rotate(252 300 300)" />
          <ellipse class="petal" cx="300" cy="194" rx="64" ry="122" transform="rotate(288 300 300)" />
          <ellipse class="petal" cx="300" cy="194" rx="64" ry="122" transform="rotate(324 300 300)" />
        </g>

        <g class="flower__group flower__group--main" transform="rotate(18 300 300)">
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(36 300 300)" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(72 300 300)" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(108 300 300)" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(144 300 300)" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(180 300 300)" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(216 300 300)" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(252 300 300)" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(288 300 300)" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(324 300 300)" />
        </g>

        <circle class="flower__core" cx="300" cy="300" r="32" />
      </svg>
    </main>
  </body>
</html>
