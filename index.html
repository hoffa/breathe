<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Breathe</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        background: #000000;
        position: fixed;
        inset: 0;
        width: 100vw;
        width: 100dvw;
        height: 100vh;
        height: 100dvh;
      }

      .app {
        position: fixed;
        inset: 0;
        width: 100vw;
        width: 100dvw;
        height: 100vh;
        height: 100dvh;
        isolation: isolate;
        overflow: hidden;
        pointer-events: none;
      }

      .flower {
        position: absolute;
        left: 50%;
        top: 50%;
        translate: -50% -50%;
        width: min(calc(min(100vw, 100vh) * 0.66), 38rem);
        width: min(calc(min(100dvw, 100dvh) * 0.66), 38rem);
        aspect-ratio: 1;
        overflow: hidden;
        isolation: isolate;
        display: block;
      }

      .flower__group,
      .flower__core {
        transform-box: fill-box;
        transform-origin: center;
      }

      .flower__group--main {
        animation: breathe-main 10s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      .petal {
        fill: url(#petal-fill);
        mix-blend-mode: screen;
      }

      .flower__group--main .petal {
        opacity: 0.54;
      }

      .flower__core {
        fill: url(#core-fill);
        opacity: 0.5;
        animation: breathe-core 10s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      @keyframes breathe-main {
        0%,
        100% {
          transform: scale(0.62);
          opacity: 0.8;
        }

        40% {
          transform: scale(1.04);
          opacity: 1;
        }
      }

      @keyframes breathe-core {
        0%,
        100% {
          transform: scale(0.68);
          opacity: 0.3;
        }

        40% {
          transform: scale(1.12);
          opacity: 0.66;
        }
      }

    </style>
  </head>
  <body>
    <main class="app" aria-label="Breathing animation">
      <svg
        class="flower"
        viewBox="0 0 600 600"
        aria-hidden="true"
        focusable="false"
      >
        <defs>
          <linearGradient id="petal-fill" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#d7efff" />
            <stop offset="34%" stop-color="#a8daf7" />
            <stop offset="70%" stop-color="#76b6ea" />
            <stop offset="100%" stop-color="#5489c9" />
          </linearGradient>
          <radialGradient id="core-fill" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#e4f5ff" stop-opacity="0.26" />
            <stop offset="34%" stop-color="#b9dff6" stop-opacity="0.16" />
            <stop offset="72%" stop-color="#79b7e6" stop-opacity="0.05" />
            <stop offset="100%" stop-color="#79b7e6" stop-opacity="0" />
          </radialGradient>
        </defs>

        <g class="flower__group flower__group--main" transform="rotate(18 300 300)">
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(36 300 300)" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(72 300 300)" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(108 300 300)" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(144 300 300)" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(180 300 300)" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(216 300 300)" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(252 300 300)" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(288 300 300)" />
          <ellipse class="petal" cx="300" cy="198" rx="56" ry="110" transform="rotate(324 300 300)" />
        </g>

        <circle class="flower__core" cx="300" cy="300" r="44" />
      </svg>
    </main>
  </body>
</html>
